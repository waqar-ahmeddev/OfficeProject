<div class="flex flex-col w-full p-10 gap-10">

    <div class="flex flex-col">

    </div>
    
    <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl shadow-lg transition-all">
      + Log Movement
    </button>
  </div>

  <!-- Content Section (Yahan aapke wo 2 naye boxes ayenge) -->
  <!-- Content Section (Dono Boxes ka container) -->
<div class="flex gap-8 w-full">

  <!-- LEFT BOX: Currently outside -->
  <div class="w-[350px] bg-white rounded-2xl shadow-sm p-6 border border-gray-100">
    <div class="flex items-center gap-2 mb-6">
      <span class="w-3 h-3 bg-orange-400 rounded-full"></span>

      <!-- Card 1 -->

        <h3 class="font-bold text-[#021d49]">Ananya Iyer</h3>
        <p class="text-sm text-gray-500">Home visit • since 12:14 PM</p>
      </div>
      <!-- Card 2 -->
      <div class="p-4 rounded-xl border border-orange-200 bg-orange-50/50">
        <h3 class="font-bold text-[#021d49]">Priya Patel</h3>

    </div>
  </div>

  <!-- RIGHT BOX: Live feed -->

    <div class="flex items-center gap-2 mb-6 text-[#021d49]">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">

    <div class="flex flex-col gap-4">
      <!-- Feed Item 1 (Check-out) -->
      <div class="flex items-center justify-between p-4 rounded-xl border border-gray-100">
        <div class="flex items-center gap-4">
          <div class="w-10 h-10 rounded-full bg-orange-100 flex items-center justify-center text-orange-600">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">

        </div>
      </div>

              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 4.5l-15 15m0 0h11.25m-11.25 0V8.25" />
            </svg>
          </div>
          <div>

        </div>
      </div>
