<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HostelOS - Calendar</title>
</head>
<body class="bg-[#F8FAFC]">
  <div class="flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <div class="sticky top-0 h-screen bg-[#1E293B] text-slate-300 flex flex-col justify-between min-w-[260px]">
      <div>
        <!-- Logo Section -->
        <div class="p-6 flex items-center gap-3">
          <div class="bg-blue-600 p-2 rounded-lg text-white">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 21h19.5m-18-18v18m10.5-18v18m6-13.5V21M6.75 6.75h.75m-.75 3h.75m-.75 3h.75m3-6h.75m-.75 3h.75m-.75 3h.75M6.75 21v-3.375c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21M3 3h12m-.75 4.5H21m-3.75 3.75h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Zm0 3h.008v.008h-.008v-.008Z" />
            </svg>
          </div>
          <div>
            <h1 class="text-white font-bold text-lg leading-none">HostelOS</h1>
            <p class="text-xs text-slate-400 mt-1">Admin</p>
          </div>
        </div>

        <!-- Navigation Buttons -->
        <nav class="mt-4 px-4 space-y-1">
          <button class="w-full flex items-center gap-3 text-slate-400 hover:text-white hover:bg-slate-900 px-4 py-3 rounded-xl transition-all duration-200 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
            </svg>
            <span class="font-medium text-left">Dashboard</span>
          </button>

          <button class="w-full flex items-center gap-3 text-slate-400 hover:text-white hover:bg-slate-900 px-4 py-3 rounded-xl transition-all duration-200 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-left">Rooms</span>
          </button>

          <button class="w-full flex items-center gap-3 text-slate-400 hover:text-white hover:bg-slate-900 px-4 py-3 rounded-xl transition-all duration-200 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <span class="text-left">Students & Staff</span>
          </button>

          <button class="w-full flex items-center gap-3 text-slate-400 hover:text-white hover:bg-slate-900 px-4 py-3 rounded-xl transition-all duration-200 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />
            </svg>
            <span class="text-left">Movement</span>
          </button>

          <button class="w-full flex items-center gap-3 text-slate-400 hover:text-white hover:bg-slate-900 px-4 py-3 rounded-xl transition-all duration-200 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            <span class="text-left">Finance</span>
          </button>

          <button class="w-full flex items-center gap-3 text-slate-400 hover:text-white hover:bg-slate-900 px-4 py-3 rounded-xl transition-all duration-200 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
            </svg>
            <span class="text-left">Complaints</span>
          </button>

          <button class="w-full flex items-center gap-3 bg-blue-600 text-white px-4 py-3 rounded-xl transition-all duration-200 group">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <span class="text-left">Calendar</span>
          </button>
        </nav>
      </div>

      <div class="p-6 border-t border-slate-700">
        <button id="sign-out" class="w-full flex items-center gap-3 text-slate-400 hover:text-white hover:bg-slate-900 px-4 py-3 rounded-xl transition-all duration-200 group">
          <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 group-hover:scale-110 transition-transform" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
          </svg>
          <span class="text-left cursor-pointer">Sign out</span>
        </button>
      </div>
    </div>

    <!-- Main Content Area -->
    <div class="flex-1 flex flex-col h-screen overflow-y-auto p-8 gap-8 bg-gray-50">
      
      <!-- Top Header Section -->
      <div class="flex items-end justify-between w-full">
          <div class="flex flex-col">
              <h1 class="text-4xl font-bold text-[#1E293B]">Calendar</h1>
              <p class="text-gray-500 text-lg mt-1">Schedule events, exams, and holidays.</p>
          </div>
          <button class="bg-[#3b82f6] hover:bg-blue-600 text-white font-semibold py-2.5 px-6 rounded-xl flex items-center gap-2 transition-all shadow-sm">
              <span class="text-xl">+</span> Add Event
          </button>
      </div>

      <!-- Calendar White Container -->
      <div class="bg-white rounded-3xl border border-gray-100 shadow-sm p-8">
        
        <!-- Month Label -->
        <div class="flex items-center gap-2 mb-8">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-slate-700" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
            </svg>
            <h2 class="text-xl font-bold text-slate-800">May 2026</h2>
        </div>

        <!-- Days of Week Header -->
        <div class="grid grid-cols-7 mb-4 border-b border-gray-50 pb-4">
            <div class="text-center text-sm font-semibold text-slate-400">Sun</div>
            <div class="text-center text-sm font-semibold text-slate-400">Mon</div>
            <div class="text-center text-sm font-semibold text-slate-400">Tue</div>
            <div class="text-center text-sm font-semibold text-slate-400">Wed</div>
            <div class="text-center text-sm font-semibold text-slate-400">Thu</div>
            <div class="text-center text-sm font-semibold text-slate-400">Fri</div>
            <div class="text-center text-sm font-semibold text-slate-400">Sat</div>
        </div>

        <!-- Calendar Grid -->
        <div class="grid grid-cols-7 gap-3">
          <div class="h-32"></div><div class="h-32"></div><div class="h-32"></div><div class="h-32"></div><div class="h-32"></div>
          
          <div class="h-32 p-3 bg-white border-2 border-blue-500 rounded-2xl shadow-sm"><span class="text-sm font-bold text-blue-600">1</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">2</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">3</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">4</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">5</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">6</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">7</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">8</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">9</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm">
            <span class="text-sm font-bold text-slate-700">10</span>
            <div class="mt-2 px-2 py-1 bg-blue-500 text-white text-[10px] font-bold rounded-lg truncate">Cultural Night</div>
          </div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">11</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">12</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">13</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">14</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm">
            <span class="text-sm font-bold text-slate-700">15</span>
            <div class="mt-2 px-2 py-1 bg-red-500 text-white text-[10px] font-bold rounded-lg truncate">Mid-term Exams</div>
          </div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">16</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">17</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">18</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">19</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm">
            <span class="text-sm font-bold text-slate-700">20</span>
            <div class="mt-2 px-2 py-1 bg-emerald-500 text-white text-[10px] font-bold rounded-lg truncate">Hostel Day Holiday</div>
          </div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">21</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">22</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">23</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">24</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">25</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">26</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">27</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">28</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">29</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">30</span></div>
          <div class="h-32 p-3 bg-white border border-gray-100 rounded-2xl shadow-sm"><span class="text-sm font-bold text-slate-700">31</span></div>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</body>
</html>
